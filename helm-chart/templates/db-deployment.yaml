apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "helm-chart.fullname" . }}-db
  labels:
    app: {{ include "helm-chart.name" . }}-db
spec:
  replicas: {{ .Values.db.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "helm-chart.name" . }}-db
  template:
    metadata:
      labels:
        app: {{ include "helm-chart.name" . }}-db
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.db.image.repository }}:{{ .Values.db.image.tag }}"
          imagePullPolicy: {{ .Values.db.image.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: {{ .Values.db.service.port }}
          env:
            - name: POSTGRES_USER
              value: {{ .Values.db.env.postgresUser | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.db.env.postgresPassword | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.db.env.postgresDb | quote }}
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: tmp
              mountPath: /tmp
            - name: run
              mountPath: /var/run/postgresql
      volumes:
        - name: postgres-data
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: run
          emptyDir: {}
